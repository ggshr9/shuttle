# CI — fast feedback on every PR and push to main.
# Full release pipeline lives in release.yml (tags only).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Lint: golangci-lint + go vet
  # ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: ""
      - run: go vet ./...

  # ──────────────────────────────────────────────
  # Test: three parallel groups with race detector
  # ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: core
            packages: ./config/... ./engine/... ./router/... ./stats/... ./proxy/... ./stream/... ./connlog/... ./obfs/... ./plugin/... ./qos/... ./subscription/...
          - name: transport
            packages: ./transport/... ./congestion/... ./crypto/...
          - name: infra
            packages: ./mesh/... ./internal/... ./server/... ./speedtest/... ./update/...
    name: test (${{ matrix.group.name }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev libgtk-3-dev
      - name: Run tests with race detector
        run: |
          # NEVER invoke go test directly — use scripts/test.sh.
          for pkg in ${{ matrix.group.packages }}; do
            ./scripts/test.sh --pkg "$pkg" --race
          done
      - name: Run tests with coverage
        if: matrix.group.name == 'core'
        run: ./scripts/test.sh --cover
      - name: Upload coverage
        if: matrix.group.name == 'core'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ──────────────────────────────────────────────
  # Build verification: just compile, no artifacts
  # ──────────────────────────────────────────────
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Verify build
        run: CGO_ENABLED=0 go build ./...

  # ──────────────────────────────────────────────
  # Service manager integration — Linux systemd
  # ──────────────────────────────────────────────
  service-integration-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run systemd sandbox test
        run: sudo -E $(which go) test -tags sandbox -run TestSandboxSystemdFullCycle ./service/

  # ──────────────────────────────────────────────
  # Service manager integration — macOS launchd
  # ──────────────────────────────────────────────
  service-integration-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run launchd integration test
        run: go test -tags integration_darwin -run TestLaunchdFullCycle ./service/

  # ──────────────────────────────────────────────
  # Service manager integration — Windows SCM
  # ──────────────────────────────────────────────
  service-integration-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run Windows SCM integration test
        shell: pwsh
        run: go test -tags integration_windows -run TestWindowsSCMFullCycle ./service/

  # ──────────────────────────────────────────────
  # Security scan: gosec (push to main only)
  # ──────────────────────────────────────────────
  security:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run gosec
        uses: securego/gosec@v2.22.4
        env:
          GOTOOLCHAIN: auto
        with:
          args: -exclude=G103,G104,G112,G115,G117,G204,G301,G304,G306,G401,G402,G404,G407,G501,G505,G602,G703,G706 -exclude-dir=quicfork ./...
