# Release — full build + publish pipeline for tagged versions.
# Triggered only on v* tags. CI (ci.yml) already validated the code on main.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Quick sanity check (CI already ran on main)
  # ──────────────────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build check
        run: CGO_ENABLED=0 go build ./cmd/shuttle ./cmd/shuttled
      - name: Run tests
        run: |
          sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev libgtk-3-dev
          ./scripts/test.sh

  # ──────────────────────────────────────────────
  # CLI binaries — pure Go, no CGo, 9 platforms
  # No frontend needed (CLI doesn't embed web UI)
  # ──────────────────────────────────────────────
  build-cli:
    needs: [preflight]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64,  ext: '' }
          - { goos: linux,   goarch: arm64,  ext: '' }
          - { goos: linux,   goarch: arm,    ext: '' }
          - { goos: linux,   goarch: mipsle, ext: '', gomips: softfloat }
          - { goos: linux,   goarch: mips,   ext: '', gomips: softfloat }
          - { goos: darwin,  goarch: amd64,  ext: '' }
          - { goos: darwin,  goarch: arm64,  ext: '' }
          - { goos: windows, goarch: amd64,  ext: '.exe' }
          - { goos: freebsd, goarch: amd64,  ext: '' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build shuttle & shuttled
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -ldflags="${LDFLAGS}" -o shuttle${{ matrix.ext }}   ./cmd/shuttle
          go build -ldflags="${LDFLAGS}" -o shuttled${{ matrix.ext }}  ./cmd/shuttled
      - name: Create archive
        run: |
          STEM="shuttle-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir "${STEM}"
          cp shuttle${{ matrix.ext }} shuttled${{ matrix.ext }} "${STEM}/"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${STEM}.zip" "${STEM}/"
          else
            tar czf "${STEM}.tar.gz" "${STEM}/"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            shuttle-*.tar.gz
            shuttle-*.zip
          retention-days: 1

  # ──────────────────────────────────────────────
  # GUI desktop — requires CGo (Wails + systray)
  # Builds frontend inline to avoid artifact deps
  # ──────────────────────────────────────────────
  build-gui:
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            ext: ''
            deps: sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev libgtk-3-dev libwebkit2gtk-4.0-dev
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
            deps: ''
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            deps: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build frontend
        working-directory: gui/web
        run: npm ci && npm run build
      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
      - name: Build shuttle-gui
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: ${{ matrix.goos == 'darwin' && '-framework UniformTypeIdentifiers' || '' }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -tags desktop,production -ldflags="${LDFLAGS}" \
            -o shuttle-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttle-gui
      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: shuttle-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 1

  # ──────────────────────────────────────────────
  # Linux packages: deb + rpm via nFPM
  # ──────────────────────────────────────────────
  package-linux:
    needs: [build-cli]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goarch: amd64, nfpm_arch: amd64 }
          - { goarch: arm64, nfpm_arch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cli-linux-${{ matrix.goarch }}
          path: dist/
      - name: Extract CLI binaries from archive
        run: |
          cd dist
          tar xzf shuttle-linux-${{ matrix.goarch }}.tar.gz
          cp shuttle-linux-${{ matrix.goarch }}/shuttle shuttle-linux-${{ matrix.goarch }}/shuttled .
      - name: Install nFPM
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin nfpm
      - name: Build deb + rpm
        env:
          VERSION: ${{ github.ref_name }}
          GOARCH: ${{ matrix.nfpm_arch }}
        run: |
          nfpm pkg --packager deb --target dist/shuttle-${{ matrix.goarch }}.deb -f build/package/nfpm.yaml
          nfpm pkg --packager rpm --target dist/shuttle-${{ matrix.goarch }}.rpm -f build/package/nfpm.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: packages-linux-${{ matrix.goarch }}
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 1

  # ──────────────────────────────────────────────
  # Docker: multi-arch image pushed to GHCR
  # ──────────────────────────────────────────────
  build-docker:
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine image tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/shuttled"
          echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.tags }}

  # ──────────────────────────────────────────────
  # Android: .aar via gomobile
  # ──────────────────────────────────────────────
  build-android:
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"
      - name: Install gomobile
        run: |
          go get golang.org/x/mobile/bind@latest
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
      - name: Build .aar
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: |
          mkdir -p mobile/android/app/libs
          gomobile bind -target=android/arm64,android/arm -androidapi 21 \
            -o mobile/android/app/libs/shuttle.aar ./mobile
      - uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: mobile/android/app/libs/shuttle.aar
          retention-days: 1

  # ──────────────────────────────────────────────
  # iOS: .xcframework via gomobile
  # ──────────────────────────────────────────────
  build-ios:
    needs: [preflight]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install gomobile
        run: |
          go get golang.org/x/mobile/bind@latest
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
      - name: Build .xcframework
        run: gomobile bind -target=ios -o mobile/ios/Shuttle.xcframework ./mobile
      - uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: mobile/ios/Shuttle.xcframework/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Release: collect all artifacts, publish
  # ──────────────────────────────────────────────
  release:
    needs: [build-cli, build-gui, package-linux, build-docker, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release

          # CLI archives (tar.gz + zip)
          find artifacts/cli-* -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;

          # GUI binaries
          find artifacts/gui-* -type f -exec cp {} release/ \;

          # Linux packages (deb + rpm)
          find artifacts/packages-* -type f \( -name '*.deb' -o -name '*.rpm' \) -exec cp {} release/ \;

          # Android
          cp artifacts/android-aar/shuttle.aar release/shuttle-android.aar || true

          # iOS
          (cd artifacts/ios-xcframework && zip -r ../../release/shuttle-ios.xcframework.zip Shuttle.xcframework/) || true

          echo "--- Release artifacts ---"
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## Shuttle ${GITHUB_REF_NAME}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              echo ""
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD"
            else
              echo "### Initial Release"
            fi
            echo ""
            echo ""
            echo "### Checksums"
            echo '```'
            cat release/checksums.txt
            echo '```'
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shuttle ${{ github.ref_name }}
          body_path: release-notes.md
          files: release/*
          fail_on_unmatched_files: false
