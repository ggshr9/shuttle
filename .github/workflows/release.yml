# Release — full build + publish pipeline for tagged versions.
# Triggered only on v* tags. CI (ci.yml) already validated the code on main.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

# Force bash on every run step regardless of runner OS. Windows runners
# default to PowerShell, which silently corrupts heredocs / ${VAR} syntax.
# Git for Windows ships with bash, so this just works on windows-latest.
defaults:
  run:
    shell: bash

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────
  # Quick sanity check (CI already ran on main)
  # ──────────────────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build check
        run: CGO_ENABLED=0 go build ./cmd/shuttle ./cmd/shuttled
      - name: Run tests
        run: |
          sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev libgtk-3-dev
          ./scripts/test.sh

  # ──────────────────────────────────────────────
  # CLI binaries — pure Go, no CGo, 9 platforms
  # No frontend needed (CLI doesn't embed web UI)
  # ──────────────────────────────────────────────
  build-cli:
    needs: [preflight]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64,  ext: '' }
          - { goos: linux,   goarch: arm64,  ext: '' }
          - { goos: linux,   goarch: arm,    ext: '' }
          - { goos: linux,   goarch: mipsle, ext: '', gomips: softfloat }
          - { goos: linux,   goarch: mips,   ext: '', gomips: softfloat }
          - { goos: darwin,  goarch: amd64,  ext: '' }
          - { goos: darwin,  goarch: arm64,  ext: '' }
          - { goos: windows, goarch: amd64,  ext: '.exe' }
          - { goos: freebsd, goarch: amd64,  ext: '' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build shuttle & shuttled
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: '0'
        run: |
          # Strip 'v' so `--version` matches what deb/rpm/brew report.
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -ldflags="${LDFLAGS}" -o shuttle${{ matrix.ext }}   ./cmd/shuttle
          go build -ldflags="${LDFLAGS}" -o shuttled${{ matrix.ext }}  ./cmd/shuttled
      - name: Create archive
        run: |
          STEM="shuttle-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir "${STEM}"
          cp shuttle${{ matrix.ext }} shuttled${{ matrix.ext }} "${STEM}/"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${STEM}.zip" "${STEM}/"
          else
            tar czf "${STEM}.tar.gz" "${STEM}/"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            shuttle-*.tar.gz
            shuttle-*.zip
          retention-days: 1

  # ──────────────────────────────────────────────
  # GUI desktop — requires CGo (Wails + systray)
  # Builds frontend inline to avoid artifact deps
  # ──────────────────────────────────────────────
  build-gui:
    needs: [preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            ext: ''
            deps: sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev libgtk-3-dev libwebkit2gtk-4.0-dev
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
            deps: ''
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            deps: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build frontend
        working-directory: gui/web
        run: npm ci && npm run build
      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
      - name: Build shuttle-gui
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: ${{ matrix.goos == 'darwin' && '-framework UniformTypeIdentifiers' || '' }}
        run: |
          # Strip 'v' so `--version` matches what deb/rpm/brew report.
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -tags desktop,production -ldflags="${LDFLAGS}" \
            -o shuttle-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttle-gui
      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: shuttle-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          retention-days: 1

  # ──────────────────────────────────────────────
  # Linux packages: deb + rpm via nFPM
  # ──────────────────────────────────────────────
  package-linux:
    needs: [build-cli]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goarch: amd64, nfpm_arch: amd64 }
          - { goarch: arm64, nfpm_arch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: cli-linux-${{ matrix.goarch }}
          path: dist/
      - name: Extract CLI binaries from archive
        run: |
          cd dist
          tar xzf shuttle-linux-${{ matrix.goarch }}.tar.gz
          cp shuttle-linux-${{ matrix.goarch }}/shuttle shuttle-linux-${{ matrix.goarch }}/shuttled .
      - name: Install nFPM
        # `go install` avoids the upstream-tarball URL/asset-name
        # fragility. Tracks @latest; bump to a fixed @vX.Y.Z if the
        # release pipeline ever needs strict reproducibility.
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
      - name: Build deb + rpm
        env:
          # Strip 'v' prefix: deb/rpm version strings don't accept v-prefixed tags.
          # `${tag#v}` removes a leading 'v' if present, otherwise leaves the value alone.
          GOARCH: ${{ matrix.nfpm_arch }}
        run: |
          export VERSION="${GITHUB_REF_NAME#v}"
          nfpm pkg --packager deb --target dist/shuttle-${{ matrix.goarch }}.deb -f build/package/nfpm.yaml
          nfpm pkg --packager rpm --target dist/shuttle-${{ matrix.goarch }}.rpm -f build/package/nfpm.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: packages-linux-${{ matrix.goarch }}
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 1

  # ──────────────────────────────────────────────
  # Docker: multi-arch image pushed to GHCR
  # ──────────────────────────────────────────────
  build-docker:
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine image tags
        id: tags
        run: |
          # Strip 'v' so the image tag matches the binary's --version
          # and the deb/rpm/brew version strings.
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/${{ github.repository_owner }}/shuttled"
          echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.tags.outputs.tags }}

  # ──────────────────────────────────────────────
  # Android: .aar via gomobile
  # ──────────────────────────────────────────────
  build-android:
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-gomobile
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"
      - name: Build .aar
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        # -checklinkname=0 keeps wlynxg/anet's linkname into the std net
        # package working under Go 1.23+ (which defaults to checklinkname=1).
        # Remove once anet drops the linkname dependency or std net exports
        # the equivalent.
        run: |
          mkdir -p mobile/android/app/libs
          gomobile bind -target=android/arm64,android/arm -androidapi 21 \
            -ldflags=-checklinkname=0 \
            -o mobile/android/app/libs/shuttle.aar ./mobile
      - uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: mobile/android/app/libs/shuttle.aar
          retention-days: 1

  # ──────────────────────────────────────────────
  # iOS: .xcframework via gomobile
  # ──────────────────────────────────────────────
  build-ios:
    needs: [preflight]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-gomobile
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build .xcframework
        run: gomobile bind -target=ios -o mobile/ios/Shuttle.xcframework ./mobile
      - uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: mobile/ios/Shuttle.xcframework/
          retention-days: 1

  # ──────────────────────────────────────────────
  # Release: collect all artifacts, publish
  # ──────────────────────────────────────────────
  release:
    needs: [build-cli, build-gui, package-linux, build-docker, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release

          # CLI archives (tar.gz + zip)
          find artifacts/cli-* -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;

          # GUI binaries
          find artifacts/gui-* -type f -exec cp {} release/ \;

          # Linux packages (deb + rpm)
          find artifacts/packages-* -type f \( -name '*.deb' -o -name '*.rpm' \) -exec cp {} release/ \;

          # Android — `release.needs` already requires build-android,
          # so the artifact must exist here; no `|| true` to mask drift.
          cp artifacts/android-aar/shuttle.aar release/shuttle-android.aar

          # iOS — same gating as Android above.
          (cd artifacts/ios-xcframework && zip -r ../../release/shuttle-ios.xcframework.zip Shuttle.xcframework/)

          echo "--- Release artifacts ---"
          ls -lh release/

      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## Shuttle ${GITHUB_REF_NAME}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              echo ""
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD"
            else
              echo "### Initial Release"
            fi
            echo ""
            echo ""
            echo "### Checksums"
            echo '```'
            cat release/checksums.txt
            echo '```'
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shuttle ${{ github.ref_name }}
          body_path: release-notes.md
          files: release/*
          fail_on_unmatched_files: true

  # ──────────────────────────────────────────────
  # Bump Homebrew tap formulae after the GitHub Release exists.
  #
  # mislav/bump-homebrew-formula-action only handles single-URL
  # formulae. Our formulae have on_arm + on_intel blocks pointing
  # at distinct architecture-specific tarballs (so Apple Silicon
  # Macs get a native binary instead of going through Rosetta).
  # The action would rewrite both URLs to whichever single
  # download-url we passed it — wrong by design.
  #
  # Instead, this job does the bump in plain bash: download both
  # darwin tarballs, compute sha256 for each, edit the formula
  # files directly, commit + push to the tap repo. ~30 lines,
  # fully deterministic, no third-party action.
  #
  # Requires HOMEBREW_TAP_TOKEN secret: a fine-grained PAT with
  # `contents:write` on ggshr9/homebrew-shuttle.
  # ──────────────────────────────────────────────
  bump-homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      VERSION: ${{ github.ref_name }}
      TAP_REPO: ggshr9/homebrew-shuttle
      BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
    steps:
      - name: Compute sha256 of darwin release tarballs
        id: shas
        run: |
          # Both shuttle and shuttled binaries ship in the same per-arch
          # tarball, so we only need two checksums total (arm64, amd64).
          # GitHub's release-asset CDN can lag a few seconds behind the
          # release-publish event, so retry on transient 404.
          for arch in arm64 amd64; do
            url="${BASE_URL}/shuttle-darwin-${arch}.tar.gz"
            out="/tmp/shuttle-darwin-${arch}.tar.gz"
            for attempt in 1 2 3 4 5; do
              if curl -fsSL -o "$out" "$url"; then break; fi
              echo "attempt ${attempt} failed for ${url}; sleeping 10s"
              sleep 10
            done
            sha=$(sha256sum "$out" | awk '{print $1}')
            echo "sha_${arch}=${sha}" >> "$GITHUB_OUTPUT"
            echo "darwin-${arch}: ${sha}"
          done

      - name: Clone tap repo
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/${TAP_REPO}.git" /tmp/tap
          cd /tmp/tap
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Rewrite both formulae
        env:
          SHA_ARM64: ${{ steps.shas.outputs.sha_arm64 }}
          SHA_AMD64: ${{ steps.shas.outputs.sha_amd64 }}
        run: |
          # Strip leading 'v' for the formula's `version` field.
          v="${VERSION#v}"

          # rewrite_formula <path>: rebuilds the on_macos block atomically
          # using a heredoc so we don't depend on regex alignment between
          # releases. Both formulae share the same darwin tarballs.
          rewrite_formula() {
            local path="$1"
            python3 - "$path" "$v" "$BASE_URL" "$SHA_ARM64" "$SHA_AMD64" <<'PY'
          import re, sys
          path, version, base, sha_arm, sha_amd = sys.argv[1:]
          with open(path) as f:
              src = f.read()
          # Replace the formula's `version` field
          src = re.sub(r'version\s+"[^"]*"', f'version "{version}"', src, count=1)
          # Replace the on_macos block (everything between `on_macos do` and
          # its matching `end`) with a freshly-generated one. This is more
          # robust than line-by-line url/sha256 rewriting.
          new_block = (
              "on_macos do\n"
              "    on_arm do\n"
              f'      url "{base}/shuttle-darwin-arm64.tar.gz"\n'
              f'      sha256 "{sha_arm}"\n'
              "    end\n"
              "    on_intel do\n"
              f'      url "{base}/shuttle-darwin-amd64.tar.gz"\n'
              f'      sha256 "{sha_amd}"\n'
              "    end\n"
              "  end"
          )
          src = re.sub(r'on_macos do\n.*?\n  end', new_block, src, count=1, flags=re.S)
          with open(path, "w") as f:
              f.write(src)
          PY
          }

          rewrite_formula /tmp/tap/Formula/shuttle.rb
          rewrite_formula /tmp/tap/Formula/shuttled.rb

          cd /tmp/tap
          git add Formula/shuttle.rb Formula/shuttled.rb
          if git diff --cached --quiet; then
            echo "no formula changes; skipping commit"
            exit 0
          fi
          git commit -m "chore: bump formulae to ${VERSION}"
          git push origin main
