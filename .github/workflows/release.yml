name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Reuse the build workflow — it already handles tagged builds
  # This workflow adds standalone release automation for tag pushes
  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            ext: ''
          - goos: linux
            goarch: arm
            ext: ''
          - goos: freebsd
            goarch: amd64
            ext: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-release-${{ matrix.goos }}-${{ matrix.goarch }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-release-${{ matrix.goos }}-${{ matrix.goarch }}-
            go-build-${{ matrix.goos }}-${{ matrix.goarch }}-
      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          go build -ldflags="${LDFLAGS}" -o shuttle-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttle
          go build -ldflags="${LDFLAGS}" -o shuttled-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttled
      - name: Create archive
        run: |
          ARCHIVE_NAME="shuttle-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "${ARCHIVE_NAME}"
          cp shuttle-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} "${ARCHIVE_NAME}/"
          cp shuttled-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} "${ARCHIVE_NAME}/"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -r "${ARCHIVE_NAME}.zip" "${ARCHIVE_NAME}/"
          else
            tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}/"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            shuttle-*.tar.gz
            shuttle-*.zip

  publish:
    needs: [build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: release-*
      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts/ -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release/ \;
          ls -la release/
      - name: Generate checksums
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt
      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          {
            echo "## Shuttle ${GITHUB_REF_NAME}"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "### Changes since ${PREV_TAG}"
              echo ""
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD"
            else
              echo "### Initial Release"
            fi
            echo ""
            echo "### Checksums"
            echo '```'
            cat release/checksums.txt
            echo '```'
          } > release-notes.md
          cat release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "Shuttle ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md \
            release/*
