name: GUI Tests

on:
  push:
    branches: [main]
    paths:
      - 'gui/web/**'
      - '.github/workflows/gui-test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'gui/web/**'
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gui/web/package-lock.json

      - name: Install dependencies
        working-directory: gui/web
        run: npm ci

      # svelte-check is advisory until pre-existing legacy-page errors are
      # cleared in later phases of the GUI refactor. New code must be clean;
      # we inspect the log in review rather than fail the job.
      - name: svelte-check (advisory)
        working-directory: gui/web
        run: npm run check
        continue-on-error: true

      - name: vitest
        working-directory: gui/web
        run: npm test

      - name: i18n guard
        working-directory: gui/web
        run: ./scripts/check-i18n.sh

      - name: Build
        working-directory: gui/web
        run: npm run build

  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gui/web/package-lock.json

      - name: Install dependencies
        working-directory: gui/web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: gui/web
        # chromium: desktop + tablet viewport projects. webkit: phone project
        # (iPhone 14 uses WebKit). Both required after the Phase 2 viewport matrix.
        run: npx playwright install --with-deps chromium webkit

      - name: Run Playwright tests
        working-directory: gui/web
        run: npx playwright test --reporter=list

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: gui/web/playwright-report/
          retention-days: 7
