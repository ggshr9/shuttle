name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24'
      - uses: golangci/golangci-lint-action@4afd733a84b2f1a21c7ce21404f413136a96b55d # v6
        with:
          version: v1.64.8

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24'
      - name: Run gosec
        uses: securego/gosec@d1d26e5c5e0006235c806e2a6fc911ff11e7f3a6 # v2.21.4
        with:
          args: -exclude-dir=quicfork ./...

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24'
      - name: Initialize CodeQL
        uses: github/codeql-action/init@ff0a06b14023c00a6b09cce92fba90e6b0bd6607 # v3
        with:
          languages: go
      - name: Build
        run: go build ./...
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ff0a06b14023c00a6b09cce92fba90e6b0bd6607 # v3

  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            deps: sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev libgtk-3-dev
          - os: windows-latest
            deps: ''
          - os: macos-latest
            deps: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24'
      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
      - run: go build ./...
      - run: go vet ./...
      - name: Run tests  # Host-safe tier; network tests auto-skip via t.Skip()
        run: go test -count=1 -v ${{ matrix.os == 'ubuntu-latest' && '-race' || '' }} ./...
      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest'
        run: go test -race -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@18283e04ce6e62d37312384ff67231eb8fd56d24 # v4
        with:
          files: coverage.out
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-node@cdca7365b2dadb8aad0a33bc7601856ffabcc48e # v4
        with:
          node-version: '22'
      - working-directory: gui/web
        run: npm ci && npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: web-dist
          path: gui/web/dist/

  # CLI client — pure Go, no CGo, cross-compile all targets
  build-cli:
    needs: [test, build-frontend]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            ext: ''
          - goos: linux
            goarch: mips
            gomips: softfloat
            ext: ''
          - goos: linux
            goarch: arm
            ext: ''
          - goos: freebsd
            goarch: amd64
            ext: ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: web-dist
          path: gui/web/dist/
      - name: Build shuttle
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o shuttle-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttle
          go build -ldflags="-s -w" -o shuttled-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttled
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            shuttle-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            shuttled-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # GUI desktop — requires CGo (Wails + systray), native build per OS
  build-gui:
    needs: [test, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            ext: ''
            deps: sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev libgtk-3-dev libwebkit2gtk-4.0-dev
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
            deps: ''
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            deps: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24'
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: web-dist
          path: gui/web/dist/
      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
      - name: Build shuttle-gui
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: ${{ matrix.goos == 'darwin' && '-framework UniformTypeIdentifiers' || '' }}
        run: go build -tags desktop,production -ldflags="-s -w" -o shuttle-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttle-gui
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: shuttle-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # Linux packages (deb/rpm)
  package-linux:
    needs: [build-cli]
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - goarch: amd64
            nfpm_arch: amd64
          - goarch: arm64
            nfpm_arch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: cli-linux-${{ matrix.goarch }}
          path: dist/
      - name: Install nFPM
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_linux_amd64.tar.gz | tar xz -C /usr/local/bin nfpm
      - name: Build packages
        env:
          VERSION: ${{ github.ref_name }}
          GOARCH: ${{ matrix.nfpm_arch }}
        run: |
          nfpm pkg --packager deb --target dist/shuttle-${{ matrix.goarch }}.deb -f build/package/nfpm.yaml
          nfpm pkg --packager rpm --target dist/shuttle-${{ matrix.goarch }}.rpm -f build/package/nfpm.yaml
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: packages-linux-${{ matrix.goarch }}
          path: |
            dist/*.deb
            dist/*.rpm

  build-docker:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v5
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shuttled:latest
            ghcr.io/${{ github.repository_owner }}/shuttled:${{ github.sha }}

  build-android:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24'
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@00854ea68c109d98c75d956347303bf7c45b0277 # v3
      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"
      - name: Install gomobile
        run: |
          go get golang.org/x/mobile/bind@latest
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
      - name: Build .aar
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: |
          mkdir -p mobile/android/app/libs
          gomobile bind -target=android/arm64,android/arm -androidapi 21 -o mobile/android/app/libs/shuttle.aar ./mobile
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-aar
          path: mobile/android/app/libs/shuttle.aar

  build-ios:
    needs: [test, build-frontend]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: '1.24'
      - name: Install gomobile
        run: |
          go get golang.org/x/mobile/bind@latest
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
      - name: Build .xcframework
        run: gomobile bind -target=ios -o mobile/ios/Shuttle.xcframework ./mobile
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ios-xcframework
          path: mobile/ios/Shuttle.xcframework/

  release:
    needs: [build-cli, build-gui, package-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts/
      - name: Prepare release files
        run: |
          mkdir -p release
          # CLI binaries
          find artifacts/cli-* -type f -exec cp {} release/ \;
          # GUI binaries
          find artifacts/gui-* -type f -exec cp {} release/ \;
          # Linux packages
          find artifacts/packages-* -type f -exec cp {} release/ \;
          # Mobile
          cp artifacts/android-aar/shuttle.aar release/shuttle-android.aar || true
          zip -r release/shuttle-ios.xcframework.zip artifacts/ios-xcframework/ || true
          ls -la release/
      - name: Generate checksums
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd release
          sha256sum * > checksums.txt
          cat checksums.txt
      - name: Create Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2
        with:
          files: release/*
          generate_release_notes: true
