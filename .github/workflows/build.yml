name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  test:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            deps: sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev libgtk-3-dev
          - os: windows-latest
            deps: ''
          - os: macos-latest
            deps: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
      - run: go build ./...
      - run: go vet ./...
      - run: go test -count=1 -v ./...

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - working-directory: gui/web
        run: npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: gui/web/dist/

  # CLI client — pure Go, no CGo, cross-compile all targets
  build-cli:
    needs: [test, build-frontend]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: windows
            goarch: amd64
            ext: '.exe'
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
          - goos: linux
            goarch: mipsle
            gomips: softfloat
            ext: ''
          - goos: linux
            goarch: mips
            gomips: softfloat
            ext: ''
          - goos: linux
            goarch: arm
            ext: ''
          - goos: freebsd
            goarch: amd64
            ext: ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: gui/web/dist/
      - name: Build shuttle
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
          CGO_ENABLED: '0'
        run: |
          go build -ldflags="-s -w" -o shuttle-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttle
          go build -ldflags="-s -w" -o shuttled-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttled
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            shuttle-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            shuttled-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # GUI desktop — requires CGo (Wails + systray), native build per OS
  build-gui:
    needs: [test, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            goos: linux
            goarch: amd64
            ext: ''
            deps: sudo apt-get update && sudo apt-get install -y gcc libayatana-appindicator3-dev libgtk-3-dev libwebkit2gtk-4.0-dev
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
            deps: ''
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ''
            deps: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: gui/web/dist/
      - name: Install dependencies
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
      - name: Build shuttle-gui
        env:
          CGO_ENABLED: '1'
          CGO_LDFLAGS: ${{ matrix.goos == 'darwin' && '-framework UniformTypeIdentifiers' || '' }}
        run: go build -tags desktop,production -ldflags="-s -w" -o shuttle-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/shuttle-gui
      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: shuttle-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  # Linux packages (deb/rpm)
  package-linux:
    needs: [build-cli]
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - goarch: amd64
            nfpm_arch: amd64
          - goarch: arm64
            nfpm_arch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cli-linux-${{ matrix.goarch }}
          path: dist/
      - name: Install nFPM
        run: |
          curl -sfL https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_linux_amd64.tar.gz | tar xz -C /usr/local/bin nfpm
      - name: Build packages
        env:
          VERSION: ${{ github.ref_name }}
          GOARCH: ${{ matrix.nfpm_arch }}
        run: |
          nfpm pkg --packager deb --target dist/shuttle-${{ matrix.goarch }}.deb -f build/package/nfpm.yaml
          nfpm pkg --packager rpm --target dist/shuttle-${{ matrix.goarch }}.rpm -f build/package/nfpm.yaml
      - uses: actions/upload-artifact@v4
        with:
          name: packages-linux-${{ matrix.goarch }}
          path: |
            dist/*.deb
            dist/*.rpm

  build-docker:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/shuttled:latest

  build-android:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - name: Install NDK
        run: sdkmanager "ndk;27.2.12479018"
      - name: Install gomobile
        run: |
          go get golang.org/x/mobile/bind@latest
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
      - name: Build .aar
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018
        run: |
          mkdir -p mobile/android/app/libs
          gomobile bind -target=android/arm64,android/arm -androidapi 21 -o mobile/android/app/libs/shuttle.aar ./mobile
      - uses: actions/upload-artifact@v4
        with:
          name: android-aar
          path: mobile/android/app/libs/shuttle.aar

  build-ios:
    needs: [test, build-frontend]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install gomobile
        run: |
          go get golang.org/x/mobile/bind@latest
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init
      - name: Build .xcframework
        run: gomobile bind -target=ios -o mobile/ios/Shuttle.xcframework ./mobile
      - uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: mobile/ios/Shuttle.xcframework/

  release:
    needs: [build-cli, build-gui, package-linux, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Prepare release files
        run: |
          mkdir -p release
          # CLI binaries
          find artifacts/cli-* -type f -exec cp {} release/ \;
          # GUI binaries
          find artifacts/gui-* -type f -exec cp {} release/ \;
          # Linux packages
          find artifacts/packages-* -type f -exec cp {} release/ \;
          # Mobile
          cp artifacts/android-aar/shuttle.aar release/shuttle-android.aar || true
          zip -r release/shuttle-ios.xcframework.zip artifacts/ios-xcframework/ || true
          ls -la release/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
