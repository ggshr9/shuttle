# ============================================================================
# Shuttle 客户端配置 / Shuttle Client Configuration
#
# 带 [必填/REQUIRED] 标记的选项必须填写，其余均为可选（已有合理默认值）。
# Options marked [REQUIRED] must be filled in. All others are optional
# with sensible defaults.
# ============================================================================


# --------------------------------------------------------------------------
# 基础设置 / Basic Settings
# --------------------------------------------------------------------------

server:
  # [必填] 服务器地址 / Server address (host:port)
  addr: "your-server.com:443"

  # [可选] 服务器显示名称 / Display name for this server
  name: "my-server"

  # [必填] 连接密码，需与服务器端一致 / Password (must match server)
  password: "your-secret-password"

  # [可选] TLS SNI，留空则自动从 addr 提取主机名
  # TLS SNI hostname. Leave empty to auto-detect from addr.
  # sni: "your-server.com"

# [可选] 多服务器列表，可通过 GUI 或 shuttle:// URI 导入
# Additional servers. Can be imported via GUI or shuttle:// URI.
# servers:
#   - addr: "server2.com:443"
#     name: "backup"
#     password: "password2"

# [可选] 订阅源，自动拉取服务器列表 / Subscription sources
# subscriptions:
#   - id: "sub1"
#     name: "My Provider"
#     url: "https://example.com/subscribe?token=xxx"


# --------------------------------------------------------------------------
# 传输协议 / Transport
# --------------------------------------------------------------------------

transport:
  # 首选传输协议 / Preferred transport protocol
  # 可选值 / Options: "auto", "h3", "reality", "cdn", "webrtc", "multipath"
  # "auto" 会自动选择最优协议 / "auto" picks the best available
  preferred: "auto"

  # [可选] 多路径调度策略（仅 multipath 模式）
  # Multipath scheduling (only when preferred: "multipath")
  # 可选值 / Options: "weighted", "min-latency", "load-balance"
  # multipath_schedule: "weighted"

  # H3 (HTTP/3 over QUIC) — 速度快，伪装成普通 HTTPS 流量
  # Fast, disguised as normal HTTPS traffic
  h3:
    enabled: true
    # path_prefix: "/cdn/stream/"

  # Reality (TLS + Noise) — 强抗检测，模仿真实网站 TLS 指纹
  # Strong anti-detection, impersonates real website TLS fingerprint
  reality:
    enabled: true
    # 模仿的目标网站域名 / Target website to impersonate
    server_name: "www.apple.com"
    # 由服务器生成的短 ID / Short ID generated by server
    short_id: "abc123"
    # 服务器公钥 / Server public key (from server genkey output)
    public_key: "server-public-key-base64"

  # CDN (HTTP/2 + gRPC) — 走 CDN 中转，适合 IP 被封的情况
  # Routes through CDN, useful when server IP is blocked
  cdn:
    enabled: false
    # CDN 域名 / CDN domain pointing to your server
    # domain: "cdn.example.com"
    # path: "/ws"
    # 模式 / Mode: "h2" (HTTP/2) 或 "grpc"
    # mode: "h2"

  # WebRTC — 基于 DataChannel，可穿透部分严格防火墙
  # WebRTC DataChannel, can bypass some strict firewalls
  # webrtc:
  #   enabled: false
  #   signal_url: "wss://signal.example.com/ws"
  #   stun_servers:
  #     - "stun:stun.l.google.com:19302"
  #   turn_servers:
  #     - "turn:turn.example.com:3478"
  #   turn_user: "user"
  #   turn_pass: "pass"
  #   ice_policy: "all"   # "all", "relay", "public"


# --------------------------------------------------------------------------
# 代理监听 / Proxy Listeners
# --------------------------------------------------------------------------

proxy:
  # 是否允许局域网设备使用此代理（如手机热点共享）
  # Allow LAN devices to use this proxy (e.g., hotspot sharing)
  # 开启后监听地址从 127.0.0.1 变为 0.0.0.0
  # When enabled, listen address changes from 127.0.0.1 to 0.0.0.0
  # allow_lan: false

  # SOCKS5 代理 / SOCKS5 proxy
  socks5:
    enabled: true
    listen: "127.0.0.1:1080"

  # HTTP 代理 / HTTP CONNECT proxy
  http:
    enabled: true
    listen: "127.0.0.1:8080"

  # TUN 虚拟网卡（全局透明代理，需管理员权限）
  # TUN device for system-wide transparent proxy (requires root/admin)
  tun:
    enabled: false
    # device_name: "shuttle0"
    # cidr: "198.18.0.0/16"
    # mtu: 1500
    # auto_route: true
    #
    # 分应用代理 / Per-app routing (macOS/Android/iOS)
    # per_app_mode: "allow"   # "allow" = 仅代理列表中的应用, "deny" = 排除列表中的应用
    # app_list:
    #   - "com.google.Chrome"
    #   - "com.apple.Safari"

  # 自动设置系统代理 / Auto-configure system proxy
  # system_proxy:
  #   enabled: false


# --------------------------------------------------------------------------
# 路由规则 / Routing
# --------------------------------------------------------------------------

routing:
  # 默认动作 / Default action for unmatched traffic
  # "proxy" = 走代理, "direct" = 直连
  default: proxy

  rules:
    # 中国大陆域名直连 / Direct connect for China mainland domains
    - domains: "geosite:cn"
      action: direct

    # 海外域名走代理 / Proxy for non-China domains
    - domains: "geosite:geolocation-!cn"
      action: proxy

    # 中国大陆 IP 直连 / Direct connect for China IPs
    - geoip: CN
      action: direct

    # 指定应用直连 / Direct connect for specific apps
    - process: ["WeChat", "QQ", "DingTalk"]
      action: direct

    # BT 下载直连 / Direct connect for BitTorrent
    - protocol: bittorrent
      action: direct

    # [可选] 自定义 IP 段规则 / Custom IP CIDR rules
    # - ip_cidr: ["192.168.0.0/16", "10.0.0.0/8"]
    #   action: direct

  dns:
    # 国内 DNS（用于解析国内域名）/ Domestic DNS for China domains
    domestic: "223.5.5.5"
    remote:
      # 远程 DNS（DoH，用于解析海外域名）/ Remote DoH for foreign domains
      server: "https://1.1.1.1/dns-query"
      # 远程 DNS 走代理还是直连 / Route remote DNS via proxy or direct
      via: proxy
    # 启用 DNS 缓存 / Enable DNS cache
    cache: true
    # 预取即将过期的 DNS 记录 / Prefetch expiring DNS records
    prefetch: true


# --------------------------------------------------------------------------
# 高级设置 / Advanced
# --------------------------------------------------------------------------

# 拥塞控制 / Congestion control
congestion:
  # 模式 / Mode: "adaptive" (自动切换), "bbr" (带宽优先), "brutal" (暴力发包)
  # "adaptive" auto-switches between BBR and Brutal based on network conditions
  mode: "adaptive"
  # brutal 模式发送速率（字节/秒，默认 100MB/s）
  # Brutal mode send rate in bytes/sec (default 100MB/s)
  # brutal_rate: 104857600

# QoS 流量优先级标记 / QoS traffic priority marking
# qos:
#   enabled: false
#   rules:
#     # 语音/视频 高优先级 / Voice/video = high priority
#     - ports: [443, 8443]
#       protocol: "udp"
#       priority: "high"       # critical, high, normal, bulk, low
#
#     # 大文件下载 低优先级 / Bulk downloads = low priority
#     - domains: ["*.cdn.example.com"]
#       priority: "bulk"
#
#     # 指定应用优先级 / Per-app priority
#     - process: ["zoom", "teams"]
#       priority: "critical"

# Mesh VPN 虚拟组网 / Mesh VPN virtual LAN
# mesh:
#   enabled: false
#   # 启用 P2P 直连（NAT 穿透）/ Enable P2P direct connection
#   p2p_enabled: false
#   p2p:
#     stun_servers:
#       - "stun.l.google.com:19302"
#       - "stun1.l.google.com:19302"
#       - "stun.cloudflare.com:3478"
#     hole_punch_timeout: "10s"
#     direct_retry_interval: "60s"
#     keep_alive_interval: "30s"
#     # 丢包率超过此值则回退到中继 / Fallback to relay if loss exceeds this
#     fallback_threshold: 0.3
#
#     # 端口伪装（用于穿透严格防火墙）/ Port spoofing for restrictive firewalls
#     # spoof_mode: "dns"     # "none", "dns" (53), "https" (443), "ike" (500)
#
#     # 禁用 UPnP/NAT-PMP 自动端口映射 / Disable automatic port mapping
#     # disable_upnp: false
#     # preferred_port: 0

# 日志 / Logging
log:
  # 日志级别 / Log level: "debug", "info", "warn", "error"
  level: "info"
  # 输出位置 / Output: "stdout", "stderr", 或文件路径 / or a file path
  output: "stdout"
