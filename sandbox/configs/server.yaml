# Shuttle Server Configuration (Sandbox)
#
# This configuration is for sandbox testing only.
# Do not use in production.

# Listen address
listen: "0.0.0.0:443"

# TLS certificates (auto-generated if empty)
tls:
  cert_file: ""
  key_file: ""

# Authentication
auth:
  password: "sandbox-test-password"
  private_key: "8830e7a1bacb499321eae32784bca8c8122153ef7690dff8814f7e8a2e25ed63"
  public_key: "d69e872aecb39b1a715bed386c26c6be0a0d5cb0a53c8da2543c3e8a9e761d73"

# Cover site (masquerading)
cover:
  mode: "default"
  static_dir: ""
  reverse_url: ""

# Transport configuration
transport:
  # H3/QUIC (primary) - only transport enabled for sandbox
  h3:
    enabled: true
    path_prefix: "/shuttle"

  # Reality/TLS+Noise - enabled for sandbox testing
  reality:
    enabled: true
    target_sni: "www.microsoft.com"
    target_addr: "www.microsoft.com:443"
    short_ids:
      - "abcd1234"

  # CDN/HTTP2 - enabled for sandbox CDN transport testing
  cdn:
    enabled: true
    listen: "0.0.0.0:8443"
    path: "/cdn/stream"

  # WebRTC DataChannel - disabled for sandbox simplicity
  webrtc:
    enabled: false

# Mesh VPN - disabled for sandbox simplicity
mesh:
  enabled: false

# Logging
log:
  level: "debug"
  format: "text"
