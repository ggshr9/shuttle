<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shuttle</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .msg {
      text-align: center;
    }
    h1 { font-size: 20px; }
    p { color: #8b949e; font-size: 14px; }
    code {
      background: #161b22;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="msg">
    <h1>Shuttle GUI</h1>
    <p>Frontend not built yet. Run:</p>
    <p><code>cd gui/web && npm install && npm run build</code></p>
    <p>The API is available at <code>/api/status</code></p>
  </div>
</body>
</html>
