run:
  timeout: 5m
  build-tags:
    - "!sandbox"  # don't lint sandbox tests on CI

linters:
  enable:
    - errcheck
    - staticcheck
    - unused
    - misspell
    - gocritic
    - govet
    - ineffassign
    - typecheck
    - gosec
    - bodyclose
    - durationcheck
    - copyloopvar
    - nilerr
    - prealloc
    - unconvert
    - gosimple
  disable:
    - exhaustive   # too noisy for switch statements
    - wrapcheck    # too strict for this project

linters-settings:
  errcheck:
    exclude-functions:
      - io.ReadFull  # HKDF reads always succeed on valid inputs
      - (io.Closer).Close
      - (net.Conn).Close
  gocritic:
    enabled-tags:
      - diagnostic
      - performance

issues:
  exclude-dirs:
    - quicfork  # forked code, don't lint
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck  # test code intentionally ignores errors for brevity
