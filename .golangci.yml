run:
  timeout: 5m
  skip-dirs:
    - quicfork

linters:
  enable:
    - errcheck
    - staticcheck
    - unused
    - misspell
    - gocritic
    - govet
    - ineffassign
    - typecheck
    - gosec
    - bodyclose
    - durationcheck
    - exportloopref
    - nilerr
    - prealloc
    - unconvert

linters-settings:
  errcheck:
    exclude-functions:
      - io.ReadFull  # HKDF reads always succeed on valid inputs
  gocritic:
    enabled-tags:
      - diagnostic
      - performance

issues:
  exclude-dirs:
    - quicfork
