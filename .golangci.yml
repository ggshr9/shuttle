run:
  timeout: 5m
  build-tags:
    - "!sandbox"  # don't lint sandbox tests on CI

linters:
  enable:
    - errcheck
    - staticcheck
    - unused
    - misspell
    - gocritic
    - govet
    - ineffassign
    - typecheck
    - gosec
    - bodyclose
    - durationcheck
    - copyloopvar
    - nilerr
    - prealloc
    - unconvert
    - gosimple
  disable:
    - exhaustive   # too noisy for switch statements
    - wrapcheck    # too strict for this project

linters-settings:
  errcheck:
    exclude-functions:
      # I/O close/read — ubiquitous, errors rarely actionable
      - io.ReadFull
      - (io.Closer).Close
      - (net.Conn).Close
      - (*net.UDPConn).Close
      - (io.Writer).Write
      - (*net.UDPConn).WriteToUDP
      # Deadlines — best-effort, failing is harmless
      - (net.Conn).SetDeadline
      - (net.Conn).SetReadDeadline
      - (net.Conn).SetWriteDeadline
      - (*net.UDPConn).SetReadDeadline
      # Relay/proxy — fire-and-forget
      - (*github.com/shuttleX/shuttle/internal/relay.Relay).Relay
      - fmt.Sscanf
      - rand.Read  # crypto/rand.Read never fails on supported OS
  gocritic:
    enabled-tags:
      - diagnostic
      - performance

issues:
  exclude-dirs:
    - quicfork  # forked code, don't lint
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck  # test code intentionally ignores errors for brevity
        - gosec     # test code has intentional unsafe patterns
    - linters:
        - gosec
      text: "G115:"  # integer overflow: bounded casts in networking code
    - linters:
        - gosec
      text: "G104:"  # unhandled errors: covered by errcheck linter
    - linters:
        - gosec
      text: "G304:"  # file inclusion: config paths are user-provided
    - linters:
        - gosec
      text: "G301:"  # directory perms: OS-specific dirs need broader perms
    - linters:
        - gosec
      text: "G306:"  # file perms: some files need wider perms by design
    - linters:
        - gosec
      text: "G404:"  # weak random: fine for non-security uses
    - linters:
        - gosec
      text: "G602:"  # slice bounds: false positives with prior checks
    - linters:
        - gosec
      text: "G117:"  # secret in struct: config contains passwords by design
    - linters:
        - gosec
      text: "G706:"  # log injection: trusted internal sources
    - linters:
        - gosec
      text: "G703:"  # path traversal: user config paths
    - linters:
        - gosec
      text: "G401:"  # weak crypto: TURN RFC requires md5/sha1
    - linters:
        - gosec
      text: "G501:"  # blocklisted crypto/md5: required by TURN RFC
    - linters:
        - gosec
      text: "G505:"  # blocklisted crypto/sha1: required by TURN RFC
    - linters:
        - gosec
      text: "G204:"  # subprocess: TUN setup uses validated config input
    - linters:
        - gosec
      text: "G402:"  # TLS InsecureSkipVerify: Reality transport and speedtest need it by design
    - linters:
        - gosec
      text: "G112:"  # Slowloris: internal servers behind auth, not exposed to internet
