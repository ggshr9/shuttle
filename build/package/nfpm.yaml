# nFPM configuration for Linux packages (deb/rpm/apk)
# https://nfpm.goreleaser.com/
#
# Usage:
#   nfpm pkg --packager deb --target dist/
#   nfpm pkg --packager rpm --target dist/
#   nfpm pkg --packager apk --target dist/

name: shuttle
arch: ${GOARCH}
platform: linux
version: ${VERSION}
maintainer: ggshr9 <ggshr9@users.noreply.github.com>
description: |
  Multi-transport network toolkit with adaptive routing, mesh networking,
  and encrypted tunneling. Features H3/QUIC, Reality/TLS+Noise, and CDN
  transports with adaptive congestion control.
vendor: Shuttle
homepage: https://github.com/ggshr9/shuttle
license: MIT

contents:
  # Client binary. The CI's "Extract CLI binaries from archive" step
  # places the binaries at ./dist/shuttle and ./dist/shuttled (without
  # arch suffix). nfpm doesn't reliably expand ${GOARCH} inside
  # contents.src globs, so referencing the flat paths is the robust
  # answer — arch is still recorded in the package metadata above.
  - src: ./dist/shuttle
    dst: /usr/bin/shuttle
    file_info:
      mode: 0755

  # Server binary
  - src: ./dist/shuttled
    dst: /usr/bin/shuttled
    file_info:
      mode: 0755

  # Example configs
  - src: ./config/client.example.yaml
    dst: /etc/shuttle/client.example.yaml
    type: config

  - src: ./config/server.example.yaml
    dst: /etc/shuttle/server.example.yaml
    type: config

  # Systemd service files
  - src: ./build/package/linux/shuttle.service
    dst: /lib/systemd/system/shuttle.service

  - src: ./build/package/linux/shuttled.service
    dst: /lib/systemd/system/shuttled.service

scripts:
  postinstall: ./build/package/linux/postinstall.sh
  preremove: ./build/package/linux/preremove.sh

overrides:
  deb:
    depends:
      - libc6
    recommends:
      - iproute2
  rpm:
    depends:
      - glibc
    recommends:
      - iproute
